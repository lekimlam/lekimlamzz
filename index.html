<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Một món quà nhỏ 🎁</title>
    <!-- Import Font chữ dễ thương từ Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #ffc3a0 0%, #ffafbd 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* ----- MÀN HÌNH NHẬP MẬT KHẨU ----- */
        #login-container {
            background: rgba(255, 255, 255, 0.9);
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(255, 117, 140, 0.3);
            text-align: center;
            transition: opacity 0.5s ease;
            width: 90%;
            max-width: 400px;
        }

        h1 {
            color: #ff4d6d;
            font-size: 24px;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border: 2px solid #ffb3c6;
            border-radius: 10px;
            font-size: 16px;
            font-family: 'Quicksand', sans-serif;
            outline: none;
            text-align: center;
            transition: border-color 0.3s ease;
        }

        input:focus {
            border-color: #ff4d6d;
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: #ff4d6d;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            font-family: 'Quicksand', sans-serif;
        }

        button:hover {
            background-color: #ff0844;
            transform: scale(1.05);
        }

        #error-msg {
            color: #e63946;
            margin-top: 15px;
            font-weight: bold;
            font-size: 14px;
            min-height: 20px;
        }

        /* ----- MÀN HÌNH TRÁI TIM & CHỦ QUYỀN ----- */
        #heart-container {
            display: none; 
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 1s ease;
        }

        .message {
            font-family: 'Dancing Script', cursive;
            font-size: 50px;
            color: #d90429;
            margin-bottom: 10px;
            opacity: 0; 
            transition: opacity 1.5s ease;
            text-shadow: 2px 2px 5px rgba(255,255,255,0.5);
        }

        /* Style cho dòng chữ đánh dấu chủ quyền */
        .signature {
            font-family: 'Quicksand', sans-serif;
            font-size: 20px;
            font-weight: 700;
            color: #ff0844;
            margin-top: 15px;
            background: rgba(255, 255, 255, 0.6);
            padding: 10px 20px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(255, 8, 68, 0.2);
            opacity: 0; /* Ẩn lúc đầu, vẽ tim xong mới hiện */
            transform: translateY(20px);
            transition: opacity 1.5s ease, transform 1.5s ease;
        }

        canvas {
            display: block;
        }

        /* Hiệu ứng tim đập */
        .pulse {
            animation: heartbeat 1.5s infinite;
        }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            15% { transform: scale(1.1); }
            30% { transform: scale(1); }
            45% { transform: scale(1.1); }
            60% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <!-- Màn hình 1: Nhập mật khẩu -->
    <div id="login-container">
        <h1>Mở khóa để nhận quà nè! 🤫</h1>
        <input type="password" id="password" placeholder="Pass là gì ta...">
        <button onclick="checkPassword()">Mở ngay 🎁</button>
        <p id="error-msg"></p>
    </div>

    <!-- Màn hình 2: Trái tim và Chủ quyền -->
    <div id="heart-container">
        <h1 class="message">Tặng cậu nè ❤️</h1>
        <canvas id="heartCanvas"></canvas>
        <div class="signature">Đóng dấu chủ quyền: Lê Kim Lâm 👑💖</div>
    </div>

    <script>
        document.getElementById("password").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                checkPassword();
            }
        });

        function checkPassword() {
            const pass = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');
            const loginContainer = document.getElementById('login-container');
            const heartContainer = document.getElementById('heart-container');

            if (pass === '1234') {
                errorMsg.textContent = '';
                loginContainer.style.opacity = '0';
                
                setTimeout(() => {
                    loginContainer.style.display = 'none';
                    heartContainer.style.display = 'flex';
                    
                    setTimeout(() => {
                        heartContainer.style.opacity = '1';
                        drawHeart(); 
                    }, 50);
                }, 500);

            } else {
                errorMsg.textContent = 'Sai gòi! Thử lại nhaaa 😜 (Gợi ý: 1234)';
            }
        }

        function drawHeart() {
            const canvas = document.getElementById("heartCanvas");
            const ctx = canvas.getContext("2d");
            
            canvas.width = 350;
            canvas.height = 350;
            
            const cx = canvas.width / 2;
            const cy = canvas.height / 2 - 20; 
            
            const points = [];
            
            for (let t = 0; t <= Math.PI * 2; t += 0.01) {
                let x = 16 * Math.pow(Math.sin(t), 3);
                let y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
                points.push({ x: cx + x * 11, y: cy + y * 11 });
            }

            let i = 0;
            ctx.lineWidth = 3;
            ctx.strokeStyle = "#ff0844"; 
            ctx.shadowBlur = 15;         
            ctx.shadowColor = "#ff0844"; 
            ctx.fillStyle = "rgba(255, 8, 68, 0.8)"; 

            function animate() {
                if (i < points.length - 1) {
                    ctx.beginPath();
                    ctx.moveTo(points[i].x, points[i].y);
                    ctx.lineTo(points[i+1].x, points[i+1].y);
                    ctx.stroke();
                    i += 3; 
                    requestAnimationFrame(animate);
                } else {
                    ctx.fill();
                    // Hiện dòng chữ "Tặng cậu nè"
                    document.querySelector('.message').style.opacity = '1';
                    
                    // Hiện dòng chữ "Đóng dấu chủ quyền: Lê Kim Lâm" trượt từ dưới lên
                    const signature = document.querySelector('.signature');
                    signature.style.opacity = '1';
                    signature.style.transform = 'translateY(0)';
                    
                    // Thêm hiệu ứng nhịp đập trái tim
                    canvas.classList.add('pulse');
                }
            }
            animate();
        }
    </script>
</body>
  </html>
